name: Android Build

on:
  push:
    branches: [main]
    tags:
      - 'android-v*'
  pull_request:
    branches: [main]
    paths:
      - 'android/**'
      - 'core/**'
      - 'Makefile'
      - '.github/workflows/android.yml'

env:
  CARGO_TERM_COLOR: always
  # Use same NDK version as local builds
  ANDROID_NDK_VERSION: "27.2.12479018"

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "android-core"

      - name: Install Android NDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;${{ env.ANDROID_NDK_VERSION }}" > /dev/null 2>&1
        shell: bash

      - name: Build Rust native library
        run: |
          cd core
          export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.ANDROID_NDK_VERSION }}
          cargo build --release -p gemini-audio-core

      - name: Generate Kotlin bindings
        run: |
          # Install uniffi-bindgen
          cargo install uniffi_bindgen --locked
          
          # Generate bindings - .so is in aarch64-linux-android target
          cd android/app
          $HOME/.cargo/bin/uniffi-bindgen generate \
            --library ../../core/target/aarch64-linux-android/release/deps/libgemini_audio_core.so \
            --language kotlin \
            --out-dir build/generated/uniffi
          
          # Copy to source directory
          cp -r build/generated/uniffi/uniffi/gemini_audio_core/* \
            src/main/java/uniffi/gemini_audio_core/

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gemini-audio-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

  release:
    name: Build Release APK
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/android-v')
    needs: build
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "android-core"

      - name: Install Android NDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;${{ env.ANDROID_NDK_VERSION }}" > /dev/null 2>&1

      - name: Build Rust native library
        run: |
          cd core
          export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.ANDROID_NDK_VERSION }}
          cargo build --release -p gemini-audio-core

      - name: Generate Kotlin bindings
        run: |
          cargo install uniffi_bindgen --locked
          
          cd android/app
          $HOME/.cargo/bin/uniffi-bindgen generate \
            --library ../../core/target/aarch64-linux-android/release/deps/libgemini_audio_core.so \
            --language kotlin \
            --out-dir build/generated/uniffi
          
          cp -r build/generated/uniffi/uniffi/gemini_audio_core/* \
            src/main/java/uniffi/gemini_audio_core/

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          VERSION_NAME=${GITHUB_REF#refs/tags/android-v}
          ./gradlew assembleRelease \
            -PversionName=$VERSION_NAME \
            -PversionCode=$(echo $VERSION_NAME | sed 's/\.//g')

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: gemini-audio-android-release
          path: android/app/build/outputs/apk/release/app-release.apk
