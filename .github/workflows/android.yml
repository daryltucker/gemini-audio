name: Android
run-name: 'Android ${{ github.ref_name }}'

on:
  push:
    tags:
      - 'android-*'

env:
  CARGO_TERM_COLOR: always
  ANDROID_NDK_VERSION: "27.2.12479018"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "android-core"

      - name: Install Android NDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;${{ env.ANDROID_NDK_VERSION }}" > /dev/null 2>&1
        shell: bash

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build Rust native library
        run: |
          export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.ANDROID_NDK_VERSION }}
          cargo ndk -t arm64-v8a -o android/app/src/main/jniLibs \
            build -p gemini-audio-core --release

      - name: Generate Kotlin bindings
        run: |
          cargo run -p gemini-audio-core --bin uniffi-bindgen -- generate \
            --library android/app/src/main/jniLibs/arm64-v8a/libgemini_audio_core.so \
            --language kotlin \
            --out-dir android/app/src/main/java

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          VERSION_NAME=${GITHUB_REF#refs/tags/android-v}
          ./gradlew assembleRelease \
            -PversionName=$VERSION_NAME \
            -PversionCode=$(echo $VERSION_NAME | sed 's/\.//g')

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gemini-audio-android-release
          path: android/app/build/outputs/apk/release/*.apk

  publish:
    name: Publish
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: gemini-audio-android-release

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#android-}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: 'Android ${{ steps.version.outputs.version }}'
          files: '*.apk'
          body: ""
          replace: true
